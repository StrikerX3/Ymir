name: Stable release

on:
  push:
    tags: ["v*"]

permissions:
  packages: write

jobs:
  parse-version:
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.version.outputs.build }}
      prerelease-version: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Parse semver string
        id: version
        uses: booxmedialtd/ws-action-parse-semver@7784200024d6b3fc01253e617ec0168daf603de3
        with:
          input_string: '${{ github.ref_name }}'
          version_extractor_regex: '^v(.*)$'

  build-all:
    uses: StrikerX3/Ymir/.github/workflows/build.yaml@main
    needs: [parse-version]
    with:
      dev-build: false
      debug-symbols: false
      build-version: ${{ needs.parse-version.outputs.build-version }}
      prerelease-version: ${{ needs.parse-version.outputs.prerelease-version }}

  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: [build-all]

    permissions:
      contents: write

    steps:
      - name: Download Ymir artifacts
        uses: actions/download-artifact@79dac248aac9d0059f86eae9d8b5bfab4e95e97c
        with:
          path: ymir
          pattern: ymir-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          draft: true
          files: |
            ymir/*
