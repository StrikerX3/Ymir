name: Screenshotter

on:
  workflow_call:
  workflow_dispatch:

env:
  SECRET: ${{ secrets.YMIR_SCREENSHOTTER_SECRET }}

jobs:
  trigger-screenshotter:
    runs-on: ubuntu-latest
    name: Trigger screenshotter job
    steps:
      # Reference: https://github.com/ioncodes/ymir-screenshotter/tree/master/deploy
      - name: Trigger screenshotter job
        env:
          SECRET: ${{ secrets.YMIR_SCREENSHOTTER_SECRET }}
        run: |
          BODY="{\"commit\":\"$GITHUB_SHA\"}"
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')
          curl -sS --fail-with-body --max-time 1800 -X POST \
              https://ymir-trigger.layle.dev/hooks/ymir-nightly \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=$SIG" \
              -d "$BODY"
